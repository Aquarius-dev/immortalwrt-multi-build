name: ramips-r4a

on:
  schedule:
    - cron: '0 2 1 * *'  # R4A at 02:00 UTC
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/build-template.yml
    with:
      device_name: xiaomi-r4a
      target: ramips
      subtarget: mt7621
      profile: xiaomi_mi-router-4a-gigabit
      lan_ip: 192.168.123.6
      config_method: single-file
      wifi_ssid: NETGEAR_5G
      wifi_encryption: psk2
      wifi_key: "13882020269"
      wifi_cipher: ccmp
