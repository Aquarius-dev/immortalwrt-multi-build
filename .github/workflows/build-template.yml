name: Build Template

on:
  workflow_call:
    inputs:
      device_name:
        required: true
        type: string
      target:
        required: true
        type: string
      subtarget:
        required: true
        type: string
      profile:
        required: true
        type: string
      lan_ip:
        required: true
        type: string
      config_method:
        required: true
        type: string
      wifi_ssid:
        required: false
        type: string
      wifi_encryption:
        required: false
        type: string
        default: "psk2"
      wifi_key:
        required: false
        type: string
      wifi_cipher:
        required: false
        type: string
        default: "ccmp"

jobs:
  build:
    name: ${{ inputs.device_name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 420

    steps:
      - name: Maximize build space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
          sudo docker image prune -af
          df -h

      - uses: actions/checkout@v6
        with:
          repository: immortalwrt/immortalwrt
          ref: master
          fetch-depth: 1

      - uses: actions/checkout@v6
        with:
          path: repo-config
          fetch-depth: 1

      - name: Apply breed-compatible patches for Xiaomi R4A
        if: inputs.device_name == 'xiaomi-r4a'
        run: |
          set -e
          patch -p1 --dry-run < repo-config/patches/ramips/0001-ramips-mt7621-xiaomi-r4a-breed-compatible-partitions.patch
          patch -p1 --dry-run < repo-config/patches/ramips/0002-ramips-mt7621-xiaomi-r4a-adjust-image-size.patch
          patch -p1 < repo-config/patches/ramips/0001-ramips-mt7621-xiaomi-r4a-breed-compatible-partitions.patch
          patch -p1 < repo-config/patches/ramips/0002-ramips-mt7621-xiaomi-r4a-adjust-image-size.patch

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git git-lfs libncurses-dev libssl-dev \
            libelf-dev python3 python3-pip python3-setuptools python3-dev rsync unzip \
            zlib1g-dev file wget qemu-utils upx-ucl autoconf automake libtool libtool-bin \
            libtool-doc curl
          sudo locale-gen en_US.UTF-8
          sudo pip3 install pyelftools --break-system-packages 2>/dev/null || sudo pip3 install pyelftools

      - name: Configure ccache
        run: |
          mkdir -p .ccache
          echo "cache_dir=$(pwd)/.ccache" > .ccache/ccache.conf
          echo "max_size=2G" >> .ccache/ccache.conf
          echo "CCACHE_DIR=$(pwd)/.ccache" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV
          echo "CCACHE_COMPRESSLEVEL=3" >> $GITHUB_ENV
          echo "/usr/lib/ccache" >> $GITHUB_PATH

      - name: Cache downloads
        uses: actions/cache@v5
        with:
          path: dl
          key: immortalwrt-master-${{ inputs.target }}-${{ inputs.subtarget }}-dl
          restore-keys: |
            immortalwrt-master-${{ inputs.target }}-${{ inputs.subtarget }}-dl
            immortalwrt-master-dl

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: .ccache
          key: ccache-${{ inputs.device_name }}
          restore-keys: |
            ccache-

      - name: Add custom feeds
        run: |
          cat >> feeds.conf.default << 'EOF'
          src-git kenzo https://github.com/kenzok8/openwrt-packages
          src-git small https://github.com/kenzok8/small
          EOF

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure firmware
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.config_method }}" = "multi-file" ]; then
            for f in repo-config/config/rockchip.config \
                     repo-config/config/extra.config \
                     repo-config/config/${{ inputs.device_name }}.config; do
              [ -f "$f" ] || { echo "Missing config: $f"; exit 1; }
            done
            cat repo-config/config/rockchip.config \
                repo-config/config/extra.config \
                repo-config/config/${{ inputs.device_name }}.config > .config
            echo "CONFIG_CCACHE=y" >> .config
            make defconfig
          else
            echo "CONFIG_TARGET_${{ inputs.target }}=y" > .config
            echo "CONFIG_TARGET_${{ inputs.target }}_${{ inputs.subtarget }}=y" >> .config
            make defconfig
            echo "CONFIG_TARGET_${{ inputs.target }}_${{ inputs.subtarget }}_DEVICE_${{ inputs.profile }}=y" >> .config
            echo "CONFIG_CCACHE=y" >> .config
            make defconfig
            CUSTOM_CONFIG="repo-config/config/${{ inputs.device_name }}.config"
            if [ -f "$CUSTOM_CONFIG" ]; then
              echo ">>> Overlaying custom config: $CUSTOM_CONFIG"
              cat "$CUSTOM_CONFIG" >> .config
              make defconfig
            fi
            for pkg in dnsmasq odhcpd odhcpd-ipv6only; do
              sed -i "s/CONFIG_PACKAGE_${pkg}=y/# CONFIG_PACKAGE_${pkg} is not set/" .config
            done
            sed -i 's/CONFIG_IPV6=y/CONFIG_IPV6=n/' .config
            grep -q 'CONFIG_IPV6' .config || echo "CONFIG_IPV6=n" >> .config
            for m in kmod-usb-core kmod-usb-ohci kmod-usb-uhci kmod-usb2; do
              sed -i "s/CONFIG_PACKAGE_${m}=y/# CONFIG_PACKAGE_${m} is not set/" .config
            done
            for p in ppp ppp-mod-pppoe; do
              sed -i "s/CONFIG_PACKAGE_${p}=y/# CONFIG_PACKAGE_${p} is not set/" .config
            done
          fi
          grep "^CONFIG_TARGET" .config | sort

      - name: Customize system config
        run: |
          mkdir -p files/etc/uci-defaults
          cat > files/etc/uci-defaults/99-custom-config << 'EOF'
          #!/bin/sh
          uci set network.lan.ipaddr='${{ inputs.lan_ip }}'
          uci set luci.main.mediaurlbase='/luci-static/material'
          uci set system.@system[0].timezone='CST-8'
          uci set system.@system[0].zonename='Asia/Shanghai'
          uci commit
          exit 0
          EOF
          chmod +x files/etc/uci-defaults/99-custom-config
          if [ "${{ inputs.wifi_ssid }}" != "" ]; then
            cat > files/etc/uci-defaults/98-wifi-config << 'EOF'
          #!/bin/sh
          . /lib/functions.sh
          RADIO=""
          for r in $(uci show wireless | grep "wifi-device" | cut -d= -f1 | cut -d. -f2 | sort -u); do
            _hwmode=$(uci get wireless.$r.hwmode 2>/dev/null)
            _band=$(uci get wireless.$r.band 2>/dev/null)
            if [ "$_hwmode" = "11a" ] || [ "$_band" = "5GHz" ]; then
              RADIO="$r"
            fi
          done
          if [ -n "$RADIO" ]; then
            uci set wireless.$RADIO.disabled='0'
            IFACE="default_$RADIO"
            if ! uci get wireless.$IFACE >/dev/null 2>&1; then
              IFACE="cfg_$RADIO"
              if ! uci get wireless.$IFACE >/dev/null 2>&1; then
                IFACE=""
              fi
            fi
            if [ -z "$IFACE" ]; then
              IFACE="default_$RADIO"
              uci set wireless.$IFACE=wifi-iface
            fi
            uci set wireless.$IFACE.mode='ap'
            uci set wireless.$IFACE.device="$RADIO"
            uci set wireless.$IFACE.ssid='${{ inputs.wifi_ssid }}'
            uci set wireless.$IFACE.encryption='${{ inputs.wifi_encryption }}'
            uci set wireless.$IFACE.key='${{ inputs.wifi_key }}'
            uci set wireless.$IFACE.cipher='${{ inputs.wifi_cipher }}'
            uci set wireless.$IFACE.disabled='0'
            uci set wireless.$IFACE.network='lan'
            uci set wireless.$IFACE.ieee80211k='1'
            uci set wireless.$IFACE.ieee80211v='1'
            uci set wireless.$IFACE.ieee80211r='1'
            uci commit wireless
          fi
          exit 0
          EOF
            chmod +x files/etc/uci-defaults/98-wifi-config
          fi

      - name: Customize banner
        run: |
          mkdir -p files/etc
          cat > files/etc/banner << EOF
          .---------------------------.
          | ImmortalWrt Custom Build |
          | Device   : ${{ inputs.device_name }}
          | Target   : ${{ inputs.target }}/${{ inputs.subtarget }}
          | LAN IP   : ${{ inputs.lan_ip }}
          .---------------------------.
          EOF

      - name: Download source packages
        shell: bash
        run: |
          set -o pipefail
          make download -j8 V=s 2>&1 | tee download.log

      - name: Build firmware
        shell: bash
        run: |
          set -o pipefail
          make -j$(nproc) V=s 2>&1 | tee build.log

      - name: Upload firmware
        uses: actions/upload-artifact@v7
        with:
          name: immortalwrt-${{ inputs.device_name }}-${{ github.sha }}
          path: |
            bin/targets/**/*
            !bin/targets/**/*.buildinfo
            !bin/targets/**/packages/**

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-log-${{ inputs.device_name }}
          path: |
            build.log
            download.log
