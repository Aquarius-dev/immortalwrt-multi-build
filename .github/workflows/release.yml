name: Release

on:
  workflow_run:
    workflows: [rockchip, ramips-r4a, ramips-k2p]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        if: github.event_name == 'workflow_run'
        with:
          path: artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Determine batch ID
        id: batch
        run: |
          BATCH_ID=$(date -u +'%Y%m%d')
          echo "batch_id=$BATCH_ID" >> $GITHUB_OUTPUT

      - name: Generate release notes
        run: |
          DEVICES_AVAILABLE=""
          if ls artifacts/*/immortalwrt-*-r2s-*.bin >/dev/null 2>&1; then
            DEVICES_AVAILABLE="${DEVICES_AVAILABLE}| NanoPi R2S | 192.168.123.2 | Full build |\n"
          fi
          if ls artifacts/*/immortalwrt-*-xiaomi-r4a-*.bin >/dev/null 2>&1; then
            DEVICES_AVAILABLE="${DEVICES_AVAILABLE}| Xiaomi R4A | 192.168.123.6 | Minimal, no DHCP |\n"
          fi
          if ls artifacts/*/immortalwrt-*-phicomm-k2p-*.bin >/dev/null 2>&1; then
            DEVICES_AVAILABLE="${DEVICES_AVAILABLE}| Phicomm K2P | 192.168.123.5 | Minimal, no DHCP |\n"
          fi
          cat > notes.md << EOF
          ## ImmortalWrt Firmware Build

          | Project | Value |
          |---------|-------|
          | Time | $(date -u '+%Y-%m-%d %H:%M UTC') |
          | Commit | \`${{ github.sha }}\` |

          ### Devices

          | Device | LAN IP | Notes |
          |--------|--------|-------|
          ${DEVICES_AVAILABLE}| | | |
          EOF

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="build-${{ steps.batch.outputs.batch_id }}"
          FIRMWARE_FILES=$(find artifacts -type f \( -name "*.bin" -o -name "*.gz" -o -name "*.img" \) \
            -not -path "*/packages/*" 2>/dev/null || true)

          if [ -z "$FIRMWARE_FILES" ]; then
            echo "No firmware files found"
            exit 0
          fi

          # Idempotent: if tag exists, create fails and we upload to existing release
          gh release create "$TAG" \
            $FIRMWARE_FILES \
            -F notes.md \
            --title "ImmortalWrt Firmware ${{ steps.batch.outputs.batch_id }}" \
            --target "${{ github.sha }}" 2>/dev/null \
            && echo "Release $TAG created" \
            || echo "Release $TAG already exists, uploading additional artifacts"

          # --clobber makes this safe to re-run; already-uploaded files are overwritten
          gh release upload "$TAG" $FIRMWARE_FILES --clobber

      - name: Cleanup old releases (keep last 3)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          ALL_TAGS=$(gh release list --json tagName --jq '.[].tagName' --limit 100 --order asc || true)
          if [ -z "$ALL_TAGS" ]; then
            echo "No releases to clean"
            exit 0
          fi
          OLD_TAGS=$(echo "$ALL_TAGS" | head -n -3)
          if [ -z "$OLD_TAGS" ]; then
            echo "Less than 4 releases exist, nothing to clean"
          else
            echo "$OLD_TAGS" | while read tag; do
              [ -z "$tag" ] && continue
              echo "Deleting: $tag"
              gh release delete "$tag" --yes 2>/dev/null || true
              gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/$tag" 2>/dev/null || true
            done
          fi
