# devices.yml - Device Configuration Registry

devices:
  r2s:
    name: "NanoPi R2S"
    target: rockchip
    subtarget: armv8
    profile: friendlyarm_nanopi_r2s
    lan_ip: 192.168.123.2
    config_method: multi-file
    description: "Full build with all features"
    schedule: "0 0 1 * *"
    
  r4a:
    name: "Xiaomi Mi Router 4A"
    target: ramips
    subtarget: mt7621
    profile: xiaomi_mi_router_4a_gigabit
    lan_ip: 192.168.123.6
    config_method: single-file
    description: "Minimal build (no DHCP/IPv6/USB/PPP)"
    schedule: "0 2 1 * *"
    
  k2p:
    name: "Phicomm K2P"
    target: ramips
    subtarget: mt7621
    profile: phicomm_k2p
    lan_ip: 192.168.123.5
    config_method: single-file
    description: "Minimal build (no DHCP/IPv6/USB/PPP)"
    schedule: "0 4 1 * *"
